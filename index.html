<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivojlanish Psixologiyasi - Elektron Test Tizimi</title>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --correct: #00ff88; --wrong: #ff4b2b; --bg: #0b0e14; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); color: #fff; }
        .container { width: 100%; max-width: 850px; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        input { width: 100%; padding: 15px; margin: 10px 0 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; }
        .btn-danger { background: rgba(255, 75, 43, 0.2); border: 1px solid var(--wrong); color: var(--wrong); margin-top: 20px; }
        .counter-badge { background: var(--primary); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .table-container { max-height: 300px; overflow-y: auto; margin: 20px 0; border-radius: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--primary); position: sticky; top: 0; background: #1a1d24; }
        
        tr:nth-child(1) td:first-child { color: #ffd700; font-weight: bold; font-size: 1.2rem; }
        tr:nth-child(2) td:first-child { color: #c0c0c0; font-weight: bold; }
        tr:nth-child(3) td:first-child { color: #cd7f32; font-weight: bold; }
        .my-row { background: rgba(0, 242, 254, 0.15) !important; border-left: 4px solid var(--primary); }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.4s; }
        .options { display: grid; gap: 12px; }
        .opt { background: rgba(255, 255, 255, 0.07); padding: 16px; border-radius: 15px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .opt:hover { background: rgba(255, 255, 255, 0.12); border-color: var(--primary); }
        .correct { background: var(--correct) !important; color: #000; font-weight: bold; }
        .wrong { background: var(--wrong) !important; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-card" class="card active">
        <h1 style="text-align:center">Tizimga Kirish</h1>
        <p style="text-align:center; color:#aaa">Ismingizni kiriting va testni boshlang</p>
        <input type="text" id="user-name" placeholder="Ismingiz va familiyangiz...">
        <button class="btn btn-primary" onclick="handleLogin()">Kirish</button>
    </div>

    <div id="lobby-card" class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="welcome-user">Salom!</h2>
            <div class="counter-badge">Ishtirokchilar: <span id="total-players">0</span></div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>№</th><th>Ishtirokchi</th><th>Ball</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()">TESTNI BOSHLASH</button>
    </div>

    <div id="quiz-card" class="card">
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div id="q-info" style="color:var(--secondary); font-weight:bold; margin-bottom:10px;"></div>
        <h2 id="q-text" style="min-height: 60px; font-size: 1.1rem;"></h2>
        <div class="options" id="opt-box"></div>
        <button class="btn btn-danger" onclick="finishQuiz()">Testni yakunlash</button>
    </div>

    <div id="result-card" class="card" style="text-align:center;">
        <h1>Yakuniy Natija</h1>
        <div style="font-size: 4rem; color: var(--primary); font-weight: 800;" id="final-score">0</div>
        <p id="final-desc"></p>
        <button class="btn btn-primary" onclick="showLobby()">Reytingga qaytish</button>
    </div>
</div>

    function getResults() {
        return JSON.parse(localStorage.getItem('psy_test_v2026') || '[]');
    }

    function saveResults(db) {
        localStorage.setItem('psy_test_v2026', JSON.stringify(db));
    }

    function handleLogin() {
        const name = document.getElementById('user-name').value.trim();
        if(!name) return alert("Iltimos, ismingizni kiriting!");
        currentUser = name;
        let db = getResults();
        if(!db.find(u => u.name === currentUser)) {
            db.push({name: currentUser, score: 0});
            saveResults(db);
        }
        showLobby();
    }

    function showLobby() {
        switchCard('lobby-card');
        document.getElementById('welcome-user').innerText = `Salom, ${currentUser}!`;
        const db = getResults();
        document.getElementById('total-players').innerText = db.length;
        db.sort((a,b) => b.score - a.score);
        const body = document.getElementById('leaderboard-body');
        body.innerHTML = '';
        db.forEach((user, i) => {
            const tr = document.createElement('tr');
            if(user.name === currentUser) tr.className = 'my-row';
            tr.innerHTML = `<td>${i+1}</td><td>${user.name}</td><td>${user.score}</td>`;
            body.appendChild(tr);
        });
    }

    function startQuiz() {
        score = 0;
        currentIdx = 0;
        shuffleArray(questions);
        switchCard('quiz-card');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= questions.length) return finishQuiz();

        const q = questions[currentIdx];
        document.getElementById('q-info').innerText = `Savol ${currentIdx+1} / ${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('fill').style.width = `${Math.round((currentIdx/questions.length)*100)}%`;

        const correctAnswer = q.a[q.c];
        const opts = [...q.a];
        shuffleArray(opts);

        const box = document.getElementById('opt-box');
        box.innerHTML = '';

        opts.forEach(text => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerText = text;
            div.onclick = () => {
                document.querySelectorAll('.opt').forEach(o => o.style.pointerEvents = 'none');

                if(text === correctAnswer) {
                    div.classList.add('correct');
                    score++;
                } else {
                    div.classList.add('wrong');
                    document.querySelectorAll('.opt').forEach(opt => {
                        if(opt.innerText === correctAnswer) opt.classList.add('correct');
                    });
                }

                setTimeout(() => {
                    currentIdx++;
                    loadQuestion();
                }, 1200);
            };
            box.appendChild(div);
        });
    }

    function finishQuiz() {
        let db = getResults();
        const userIdx = db.findIndex(u => u.name === currentUser);
        if(userIdx > -1 && score > db[userIdx].score) {
            db[userIdx].score = score;
        } else if(userIdx === -1) {
            db.push({name: currentUser, score: score});
        }
        saveResults(db);

        switchCard('result-card');
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
    }

    function switchCard(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
