    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        if (currentIdx >= questions.length) return showFinalResult();
        
        const q = questions[currentIdx];
        document.getElementById('q-info').innerText = `Savol ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('fill').style.width = `${(currentIdx / questions.length) * 100}%`;
        
        const opts = [...q.d, q.a].sort(() => Math.random() - 0.5);
        const box = document.getElementById('opt-box');
        box.innerHTML = '';
        
        opts.forEach(text => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerText = text;
            div.onclick = () => select(text, q.a, div);
            box.appendChild(div);
        });
    }

    function select(chosen, correct, el) {
        const all = document.querySelectorAll('.opt');
        all.forEach(o => o.style.pointerEvents = 'none');

        if (chosen === correct) {
            score++;
            el.classList.add('correct');
        } else {
            el.classList.add('wrong');
            all.forEach(o => { if (o.innerText === correct) o.classList.add('correct'); });
        }

        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1000);
    }

    function showFinalResult() {
        document.getElementById('quiz-box').style.display = 'none';
        const resBox = document.getElementById('result');
        resBox.style.display = 'block';
        document.getElementById('score-text').innerText = `${score} / ${questions.length}`;
        const percent = Math.round((score / questions.length) * 100);
        document.getElementById('stat-desc').innerText = `Siz jami savollarning ${percent}% qismiga to'g'ri javob berdingiz.`;
    }

    loadQuestion();
</script>
